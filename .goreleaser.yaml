# goreleaser config — builds signed, cross-platform binaries.
# Code signing/notarization (added before public release) removes the
# first-run OS-keystore access prompt for end users.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: keyward
    main: ./cmd/keyward
    binary: keyward
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: true # never auto-publish; flipped manually after review

changelog:
  use: github
