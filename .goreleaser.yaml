# goreleaser config — builds signed, cross-platform binaries.
# Code signing/notarization (added before public release) removes the
# first-run OS-keystore access prompt for end users.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: keyward
    main: ./cmd/keyward
    binary: keyward
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: keyward
    repository:
      owner: arturayupov
      name: homebrew-tap
    homepage: "https://github.com/arturayupov/keyward"
    description: "Local, encrypted secret broker for AI agents (MCP server + CLI)"
    license: "MIT"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com

scoops:
  - name: keyward
    repository:
      owner: arturayupov
      name: scoop-bucket
    homepage: "https://github.com/arturayupov/keyward"
    description: "Local, encrypted secret broker for AI agents (MCP server + CLI)"
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com

release:
  draft: false # public project; releases are published

changelog:
  use: github
